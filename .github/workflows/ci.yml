name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff format
        run: uv run ruff format --check .
      - name: Ruff lint
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy pypackages/framework-core/src
      - name: Run Python tests
        run: uv run pytest tests

  typescript-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: Run Vitest
        run: npm run test:ui

  package-and-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install JS dependencies
        run: npm ci

      - name: Build Python package
        run: |
          cd pypackages/framework-core
          uv build

      - name: Install wheel in isolated environment
        run: |
          uv venv .e2e-venv
          .e2e-venv/bin/python -m pip install pypackages/framework-core/dist/*.whl

      - name: Get Playwright version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          BACKEND_URL: http://127.0.0.1:8000
        run: |
          .e2e-venv/bin/python -m uvicorn example.app:app --host 127.0.0.1 --port 8000 &
          BACKEND_PID=$!

          cleanup() {
            kill "$BACKEND_PID"
          }
          trap cleanup EXIT

          for _ in {1..30}; do
            if curl -fsS "$BACKEND_URL/health" >/dev/null; then
              break
            fi
            sleep 1
          done

          npx playwright test

      - name: Upload Playwright traces
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 30

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload package wheel
        uses: actions/upload-artifact@v7
        with:
          name: package-wheel
          path: pypackages/framework-core/dist/*.whl

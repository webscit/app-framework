[tool.uv.workspace]
members = ["pypackages/framework-core", "example"]

[dependency-groups]
dev = [
  "httpx>=0.27",
  "mypy>=1.10",
  "pre-commit>=3.7",
  "pytest>=8.0",
  "ruff>=0.4.4",
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
strict = true
python_version = "3.11"
